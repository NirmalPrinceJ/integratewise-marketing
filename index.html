    <style>
      /* Subtle diagonal cut on hero — architectural, not template */
      [class*="hero"]:not(nav):not(header) {
        clip-path: polygon(0 0, 100% 0, 100% 92%, 0 100%);
        padding-bottom: 0 !important;
        padding-top: 2rem !important;
        min-height: auto !important;
      }
      
      @media (min-width: 768px) {
        [class*="hero"]:not(nav):not(header) {
          padding-bottom: 0 !important;
          padding-top: 3rem !important;
        }
      }
      
      /* Hero section layout - tightly align content */
      [class*="hero"] {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: auto !important;
        gap: 0 !important;
      }
      
      /* Hero text content - no extra margins */
      [class*="hero"] h1,
      [class*="hero"] h2,
      [class*="hero"] p,
      [class*="hero"] [class*="headline"],
      [class*="hero"] [class*="sub"] {
        margin-top: 0 !important;
        margin-bottom: 0.5rem !important;
        line-height: 1.2 !important;
      }
      
      /* Hero buttons/pills - tight spacing */
      [class*="hero"] [class*="buttons"],
      [class*="hero"] [class*="pills"] {
        margin-top: 1rem !important;
        margin-bottom: 0 !important;
        gap: 0.5rem !important;
      }
      
      /* Remove blank spaces around images */
      img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0;
        padding: 0;
      }
      
      /* Ensure images fill containers without gaps */
      .surface-grid img,
      [class*="showcase"] img,
      [class*="grid"] img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      
      /* Tighten image containers */
      [class*="showcase"],
      .surface-grid > div,
      [class*="card"] {
        overflow: hidden;
        line-height: 0;
      }
    </style>

    <div id="root"></div>
    
    <script>
      // Google Calendar Booking
      const BOOKING_URL = 'https://calendar.app.google/72HQojwJ3yyEKcvA9';
      function setupBooking() {
        document.querySelectorAll('button').forEach(btn => {
          if ((btn.textContent.includes('Book Demo') || btn.textContent.includes('Book a Demo')) && !btn.dataset.booking) {
            btn.dataset.booking = 'true';
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              window.open(BOOKING_URL, '_blank');
            });
          }
        });
      }
      new MutationObserver(setupBooking).observe(document.body, { childList: true, subtree: true });
      document.addEventListener('DOMContentLoaded', setupBooking);
      setTimeout(setupBooking, 1000);
      setTimeout(setupBooking, 2000);
    </script>
    
    <script>
      // Fix blank spaces and image alignment after React renders
      function fixLayout() {
        // Find the hero section specifically
        const allElements = document.querySelectorAll('*');
        let heroSection = null;
        
        allElements.forEach(el => {
          const text = el.textContent || '';
          if ((text.includes('ONE CONNECTED') || text.includes('SPINE-POWERED')) && el.tagName !== 'BODY') {
            let current = el;
            while (current && current.tagName !== 'BODY' && current.tagName !== 'SECTION') {
              current = current.parentElement;
            }
            if (current && current.tagName === 'SECTION') {
              heroSection = current;
            }
          }
        });
        
        // Fix hero section layout
        if (heroSection) {
          heroSection.style.paddingTop = '2rem';
          heroSection.style.paddingBottom = '2rem';
          heroSection.style.minHeight = 'auto';
          heroSection.style.display = 'flex';
          heroSection.style.alignItems = 'center';
          heroSection.style.justifyContent = 'center';
          
          // Find all direct children and tighten them
          Array.from(heroSection.children).forEach(child => {
            child.style.marginTop = '0';
            child.style.marginBottom = '0';
            
            // If this is a flex container, ensure items are centered
            const childStyle = window.getComputedStyle(child);
            if (childStyle.display === 'flex' || childStyle.display === 'grid') {
              child.style.alignItems = 'center';
              child.style.gap = '1rem';
            }
          });
          
          // Find text elements and remove extra margins
          heroSection.querySelectorAll('h1, h2, h3, p').forEach(el => {
            el.style.marginTop = '0';
            el.style.marginBottom = '0.5rem';
          });
        }
        
        // Fix all sections - remove excessive padding
        document.querySelectorAll('section').forEach(el => {
          const style = window.getComputedStyle(el);
          const paddingBottom = parseInt(style.paddingBottom);
          const paddingTop = parseInt(style.paddingTop);
          
          if (paddingBottom > 60) {
            el.style.paddingBottom = '2rem';
          }
          if (paddingTop > 60) {
            el.style.paddingTop = '2rem';
          }
          
          const minHeight = style.minHeight;
          if (minHeight && minHeight !== '0px' && parseInt(minHeight) > 500) {
            el.style.minHeight = 'auto';
          }
        });
        
        // Fix all images
        document.querySelectorAll('img').forEach(img => {
          img.style.display = 'block';
          img.style.margin = '0';
          img.style.padding = '0';
          img.style.maxWidth = '100%';
        });
      }
      
      // Run after React renders
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(fixLayout, 500);
        setTimeout(fixLayout, 1500);
        setTimeout(fixLayout, 3000);
      });
    </script>
