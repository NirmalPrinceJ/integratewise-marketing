    <style>
      /* AGGRESSIVE: Remove ALL blank space in hero */
      section[class*="hero"],
      div[class*="hero"] {
        min-height: auto !important;
        height: auto !important;
        padding-top: 2rem !important;
        padding-bottom: 2rem !important;
        margin-bottom: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      
      /* Force all hero children to have no margins */
      section[class*="hero"] > *,
      div[class*="hero"] > * {
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }
      
      /* Hero headings and text - tight spacing */
      section[class*="hero"] h1,
      section[class*="hero"] h2,
      section[class*="hero"] p,
      div[class*="hero"] h1,
      div[class*="hero"] h2,
      div[class*="hero"] p {
        margin-top: 0 !important;
        margin-bottom: 0.25rem !important;
        line-height: 1.2 !important;
      }
      
      /* Remove blank spaces around images */
      img {
        display: block;

      }
      
      /* Ensure images fill containers without gaps */

      [class*="showcase"] img,
      [class*="grid"] img {

        height: 100%;
        object-fit: cover;
        object-position: center;

      /* Tighten image containers */

      .surface-grid > div,
      [class*="card"] {

    <div id="root"></div>
    
    <script>
      // Google Calendar Booking
      const BOOKING_URL = 'https://calendar.app.google/72HQojwJ3yyEKcvA9';
      function setupBooking() {
        document.querySelectorAll('button').forEach(btn => {
          if ((btn.textContent.includes('Book Demo') || btn.textContent.includes('Book a Demo')) && !btn.dataset.booking) {
            btn.dataset.booking = 'true';
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              window.open(BOOKING_URL, '_blank');
            });
          }
        });
      }
      new MutationObserver(setupBooking).observe(document.body, { childList: true, subtree: true });
      document.addEventListener('DOMContentLoaded', setupBooking);
      setTimeout(setupBooking, 1000);
      setTimeout(setupBooking, 2000);
    </script>
    
    <script>
      // AGGRESSIVE: Fix hero layout and remove ALL blank spaces
      function fixHeroLayout() {
        // Find hero by looking for the specific text
        const allElements = document.querySelectorAll('*');
        let heroSection = null;
        
        for (const el of allElements) {
          const text = el.textContent || '';
          if (text.includes('ONE CONNECTED') && text.includes('SPINE-POWERED') && el.tagName !== 'BODY') {
            let current = el;
            while (current && current.tagName !== 'BODY') {
              if (current.tagName === 'SECTION') {
                heroSection = current;
                break;
              }
              current = current.parentElement;
            }
            if (heroSection) break;
          }
        }
        
        if (!heroSection) return;
        
        // Reset hero section completely
        heroSection.style.cssText = '';
        heroSection.style.minHeight = 'auto';
        heroSection.style.height = 'auto';
        heroSection.style.paddingTop = '2rem';
        heroSection.style.paddingBottom = '2rem';
        heroSection.style.marginBottom = '0';
        heroSection.style.display = 'flex';
        heroSection.style.alignItems = 'center';
        heroSection.style.justifyContent = 'center';
        
        // Fix all children
        const fixElement = (el) => {
          el.style.marginTop = '0';
          el.style.marginBottom = '0';
          el.style.paddingTop = '0';
          el.style.paddingBottom = '0';
          
          Array.from(el.children).forEach(child => {
            child.style.marginTop = '0';
            child.style.marginBottom = '0';
            child.style.paddingTop = '0';
            child.style.paddingBottom = '0';
            
            if (child.children.length > 0) {
              fixElement(child);
            }
          });
        };
        
        fixElement(heroSection);
        
        // Fix headings specifically
        heroSection.querySelectorAll('h1, h2, h3, p').forEach(el => {
          el.style.marginTop = '0';
          el.style.marginBottom = '0.25rem';
          el.style.lineHeight = '1.2';
        });
      }
      
      // Run multiple times to catch React renders
      document.addEventListener('DOMContentLoaded', () => {
        fixHeroLayout();
        setTimeout(fixHeroLayout, 100);
        setTimeout(fixHeroLayout, 500);
        setTimeout(fixHeroLayout, 1000);
        setTimeout(fixHeroLayout, 2000);
      });
    </script>
