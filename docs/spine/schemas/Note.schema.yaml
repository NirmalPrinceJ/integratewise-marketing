$ref: "#/definitions/Note"
definitions:
  Note:
    type: object
    properties:
      id:
        type: string
        minLength: 1
        maxLength: 256
      source_tool:
        type: string
        minLength: 1
        maxLength: 128
      external_ref:
        type: object
        properties:
          tool:
            $ref: "#/definitions/Note/properties/source_tool"
          id:
            type: string
            minLength: 1
            maxLength: 256
          url:
            type: string
            format: uri
        required:
          - tool
          - id
        additionalProperties: false
      created_at:
        type: string
        format: date-time
      updated_at:
        $ref: "#/definitions/Note/properties/created_at"
      _reserved:
        type: object
        properties:
          workspace_id:
            $ref: "#/definitions/Note/properties/id"
          created_by:
            $ref: "#/definitions/Note/properties/id"
          updated_by:
            $ref: "#/definitions/Note/properties/id"
          request_id:
            type: string
            minLength: 1
            maxLength: 128
          policy_id:
            type: string
            minLength: 1
            maxLength: 128
        additionalProperties: false
      title:
        type: string
        minLength: 1
        maxLength: 280
      body_md:
        type: string
        maxLength: 200000
      tags:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 64
        default: []
      linked_entity_ids:
        type: array
        items:
          $ref: "#/definitions/Note/properties/id"
        default: []
    required:
      - id
      - source_tool
      - created_at
      - title
      - body_md
    additionalProperties: false
$schema: http://json-schema.org/draft-07/schema#
