<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Papers — IntegrateWise Research & Insights</title>
  <meta name="description" content="Download white papers from IntegrateWise on B2B integration, workflow automation, and business operations strategies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }
    
    .header {
      background: #0C0C0C;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }
    
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    
    .header p {
      font-size: 18px;
      color: #ccc;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    
    .whitepapers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 40px;
      margin-bottom: 60px;
    }
    
    .whitepaper-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    
    .whitepaper-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transform: translateY(-4px);
    }
    
    .whitepaper-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }
    
    .whitepaper-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .whitepaper-content {
      padding: 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    
    .whitepaper-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    
    .whitepaper-summary {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .whitepaper-topics {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    
    .topic-tag {
      background: #f0f0f0;
      color: #666;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .whitepaper-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
    }
    
    .download-link {
      background: #667eea;
      color: white;
      padding: 6px 14px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
    }
    
    .download-link:hover {
      background: #5568d3;
      transform: scale(1.05);
    }
    
    .view-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    
    .view-link:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #666;
    }
    
    .error {
      background: #ffe0e0;
      color: #c00;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    nav {
      background: #f9f9f9;
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 20px;
    }
    
    nav a {
      color: #666;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }
    
    nav a:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/blog/">Blog</a>
    <a href="/resources/">Resources</a>
    <a href="/articles/">Articles</a>
    <a href="/white-papers/">White Papers</a>
  </nav>

  <div class="header">
    <h1>White Papers</h1>
    <p>Deep-dive research and strategic insights</p>
  </div>

  <div class="container">
    <div id="error-container"></div>
    <div id="loading" class="loading">Loading white papers...</div>
    <div class="whitepapers-grid" id="whitepapers-grid" style="display: none;"></div>
  </div>

  <script type="module">
    import { contentUtils } from '/js/content-utils.js';
    import * as Sentry from 'https://cdn.jsdelivr.net/npm/@sentry/browser@7/esm/index.min.js';

    // Initialize Sentry for frontend error tracking
    Sentry.init({
      dsn: 'YOUR_SENTRY_DSN_FRONTEND',
      environment: 'production',
      release: '1.0.0',
      tracesSampleRate: 1.0,
    });

    async function loadWhitePapers() {
      try {
        const response = await fetch('/api/content?type=whitepaper&limit=12');
        if (!response.ok) throw new Error('Failed to fetch white papers');
        
        const result = await response.json();
        const whitepapers = result.data || [];

        const grid = document.getElementById('whitepapers-grid');
        const loading = document.getElementById('loading');

        if (whitepapers.length === 0) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No white papers available yet.</p>';
        } else {
          grid.innerHTML = whitepapers
            .map((paper) => `
              <div class="whitepaper-card">
                <div class="whitepaper-image">
                  ${paper.image?.asset?.url ? `<img src="${paper.image.asset.url}" alt="${paper.image.alt || paper.title}" />` : ''}
                </div>
                <div class="whitepaper-content">
                  <h2 class="whitepaper-title">${paper.title}</h2>
                  <p class="whitepaper-summary">${paper.summary || ''}</p>
                  ${paper.topics && paper.topics.length ? `
                    <div class="whitepaper-topics">
                      ${paper.topics.map((topic) => `<span class="topic-tag">${topic}</span>`).join('')}
                    </div>
                  ` : ''}
                  <div class="whitepaper-meta">
                    <span>${paper.author || 'IntegrateWise'}</span>
                    ${paper.downloadUrl ? `
                      <a href="${paper.downloadUrl}" target="_blank" class="download-link">Download PDF</a>
                    ` : `
                      <a href="/white-papers/${paper.slug.current}" class="view-link">View →</a>
                    `}
                  </div>
                </div>
              </div>
            `)
            .join('');
        }

        grid.style.display = 'grid';
        loading.style.display = 'none';
      } catch (error) {
        console.error('[White Papers] Load error:', error);
        Sentry.captureException(error);
        
        const errorContainer = document.getElementById('error-container');
        errorContainer.innerHTML = '<div class="error">Failed to load white papers. Please try again later.</div>';
        document.getElementById('loading').style.display = 'none';
      }
    }

    loadWhitePapers();
  </script>
</body>
</html>
