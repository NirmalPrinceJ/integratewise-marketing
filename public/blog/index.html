<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegrateWise Blog — Integration & Workflow Insights</title>
  <meta name="description" content="Read the latest articles about B2B integration, workflow automation, and AI agents from IntegrateWise." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }
    
    .header {
      background: #0C0C0C;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }
    
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    
    .header p {
      font-size: 18px;
      color: #ccc;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 40px;
      margin-bottom: 60px;
    }
    
    .blog-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .blog-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transform: translateY(-4px);
    }
    
    .blog-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }
    
    .blog-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .blog-content {
      padding: 24px;
    }
    
    .blog-category {
      display: inline-block;
      background: #f0f0f0;
      color: #666;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .blog-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    
    .blog-excerpt {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .blog-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
    }
    
    .blog-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    
    .blog-link:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #666;
    }
    
    .error {
      background: #ffe0e0;
      color: #c00;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    nav {
      background: #f9f9f9;
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 20px;
    }
    
    nav a {
      color: #666;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }
    
    nav a:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/blog/">Blog</a>
    <a href="/resources/">Resources</a>
    <a href="/articles/">Articles</a>
    <a href="/white-papers/">White Papers</a>
  </nav>

  <div class="header">
    <h1>Blog</h1>
    <p>Insights on integration, automation, and connected workflows</p>
  </div>

  <div class="container">
    <div id="error-container"></div>
    <div id="loading" class="loading">Loading blog posts...</div>
    <div class="blog-grid" id="blog-grid" style="display: none;"></div>
  </div>

  <script type="module">
    import { contentUtils } from '/js/content-utils.js';
    import * as Sentry from 'https://cdn.jsdelivr.net/npm/@sentry/browser@7/esm/index.min.js';

    // Initialize Sentry for frontend error tracking
    Sentry.init({
      dsn: 'YOUR_SENTRY_DSN_FRONTEND',
      environment: 'production',
      release: '1.0.0',
      tracesSampleRate: 1.0,
    });

    async function loadBlogPosts() {
      try {
        const response = await fetch('/api/content?type=blog&limit=12');
        if (!response.ok) throw new Error('Failed to fetch blog posts');
        
        const result = await response.json();
        const posts = result.data || [];

        const grid = document.getElementById('blog-grid');
        const loading = document.getElementById('loading');

        if (posts.length === 0) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No blog posts available yet.</p>';
        } else {
          grid.innerHTML = posts
            .map((post) => `
              <div class="blog-card">
                <div class="blog-image">
                  ${post.image?.asset?.url ? `<img src="${post.image.asset.url}" alt="${post.image.alt || post.title}" />` : ''}
                </div>
                <div class="blog-content">
                  ${post.category ? `<div class="blog-category">${post.category}</div>` : ''}
                  <h2 class="blog-title">${post.title}</h2>
                  <p class="blog-excerpt">${post.excerpt || ''}</p>
                  <div class="blog-meta">
                    <span>${post.author || 'IntegrateWise'}</span>
                    <a href="/blog/${post.slug.current}" class="blog-link">Read More →</a>
                  </div>
                  <div style="font-size: 12px; color: #ccc; margin-top: 8px;">
                    ${contentUtils.formatDate(post.publishedAt)}
                  </div>
                </div>
              </div>
            `)
            .join('');
        }

        grid.style.display = 'grid';
        loading.style.display = 'none';
      } catch (error) {
        console.error('[Blog] Load error:', error);
        Sentry.captureException(error);
        
        const errorContainer = document.getElementById('error-container');
        errorContainer.innerHTML = '<div class="error">Failed to load blog posts. Please try again later.</div>';
        document.getElementById('loading').style.display = 'none';
      }
    }

    loadBlogPosts();
  </script>
</body>
</html>
