<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spine Unified Entity Model</title>
  <desc id="desc">3D cube with schema hints: entities, relations, constraints</desc>
  <defs>
    <linearGradient id="spineBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A4A"/>
      <stop offset="100%" stop-color="#243459"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#spineBg)"/>
  <g transform="translate(600,400)">
    <g fill="none" stroke="#3F51B5" stroke-width="3">
      <polygon points="-120,-60 0,-120 120,-60 0,0"/>
      <polygon points="-120,-60 0,0 0,140 -120,80"/>
      <polygon points="120,-60 0,0 0,140 120,80"/>
    </g>
    <g fill="#223255" stroke="#3F51B5" stroke-width="1" opacity="0.8">
      <circle cx="-90" cy="-20" r="10"/>
      <rect x="-10" y="-110" width="20" height="20"/>
      <polygon points="90,-20 100,0 80,0"/>
    </g>
  </g>
  <text x="60" y="80" fill="#F3F4F6" font-family="Inter" font-weight="600" font-size="36">Spine - Unified Entity Model</text>
  <text x="60" y="120" fill="#C7CBD6" font-family="Inter" font-size="20">Accounts, Contacts, Tasks, Decisions, Ideas</text>
  <g font-family="Inter" fill="#F3F4F6" font-size="18">
    <text x="800" y="200">Constraints</text>
    <text x="800" y="230">- accounts.domain UNIQUE</text>
    <text x="800" y="260">- contacts.account_id to accounts.account_id</text>
    <text x="800" y="290">- updated_by, updated_at required</text>
    <text x="800" y="340">Governance</text>
    <text x="800" y="370">- rbac_scope</text>
    <text x="800" y="400">- lineage_id</text>
    <text x="800" y="430">- source_system</text>
    <text x="800" y="460">- sync_strategy</text>
  </g>
  <g stroke="#3F51B533" stroke-width="1">
    <path d="M0 700 H1200 M0 600 H1200 M0 500 H1200 M0 400 H1200 M0 300 H1200"/>
    <path d="M100 0 V800 M200 0 V800 M300 0 V800 M400 0 V800 M500 0 V800 M600 0 V800 M700 0 V800 M800 0 V800 M900 0 V800 M1000 0 V800 M1100 0 V800"/>
  </g>
</svg>
