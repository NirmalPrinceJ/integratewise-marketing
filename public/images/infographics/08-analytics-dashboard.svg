<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dashboards - Metrics and Health</title>
  <desc id="desc">Analytics tiles with line graph, bar chart, and gauges</desc>
  <rect width="1200" height="800" fill="#1E2A4A"/>
  <g transform="translate(120,160)">
    <rect width="960" height="480" rx="16" fill="#223255" stroke="#3F51B5" stroke-width="2"/>
    <g transform="translate(40,40)">
      <rect width="420" height="160" rx="10" fill="#1F2B4E" stroke="#3F51B5"/>
      <polyline points="10,140 60,120 110,130 160,90 210,100 260,60 310,80 360,40 410,70" fill="none" stroke="#36C5F0" stroke-width="3"/>
      <text x="20" y="30" fill="#F3F4F6" font-family="Inter" font-size="16">Workflow Throughput</text>
    </g>
    <g transform="translate(500,40)">
      <rect width="420" height="160" rx="10" fill="#1F2B4E" stroke="#3F51B5"/>
      <rect x="40" y="80" width="40" height="60" fill="#3F51B5"/>
      <rect x="120" y="60" width="40" height="80" fill="#36C5F0"/>
      <rect x="200" y="40" width="40" height="100" fill="#F54476"/>
      <rect x="280" y="70" width="40" height="70" fill="#2EB67D"/>
      <rect x="360" y="50" width="40" height="90" fill="#ECB22E"/>
      <text x="20" y="30" fill="#F3F4F6" font-family="Inter" font-size="16">Provider Latency (ms)</text>
    </g>
    <g transform="translate(40,230)">
      <rect width="420" height="190" rx="10" fill="#1F2B4E" stroke="#3F51B5"/>
      <circle cx="110" cy="115" r="60" fill="none" stroke="#3F51B5" stroke-width="10"/>
      <path d="M110 115 L110 65" stroke="#36C5F0" stroke-width="10" stroke-linecap="round"/>
      <circle cx="310" cy="115" r="60" fill="none" stroke="#3F51B5" stroke-width="10"/>
      <path d="M310 115 L350 145" stroke="#F54476" stroke-width="10" stroke-linecap="round"/>
      <text x="20" y="30" fill="#F3F4F6" font-family="Inter" font-size="16">Health and Alerts</text>
    </g>
    <g transform="translate(500,230)">
      <rect width="420" height="190" rx="10" fill="#1F2B4E" stroke="#3F51B5"/>
      <text x="20" y="30" fill="#F3F4F6" font-family="Inter" font-size="16">Top Events</text>
      <g fill="#C7CBD6" font-family="Inter" font-size="14">
        <text x="20" y="60">Stripe.payment_intent.succeeded</text>
        <text x="20" y="90">Slack.message.channel</text>
        <text x="20" y="120">Razorpay.payment.failed</text>
        <text x="20" y="150">Notion.page.updated</text>
      </g>
    </g>
  </g>
  <text x="60" y="80" fill="#F3F4F6" font-family="Inter" font-weight="600" font-size="36">Dashboards - Metrics and Health</text>
  <text x="60" y="120" fill="#C7CBD6" font-family="Inter" font-size="20">Throughput, Latency, Health, Top Events</text>
</svg>
