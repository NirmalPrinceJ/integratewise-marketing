  </g>
  <text x="60" y="80" fill="#F3F4F6" font-family="Inter" font-weight="600" font-size="36">Ingest: Connectors and Sources</text>
  <text x="60" y="120" fill="#C7CBD6" font-family="Inter" font-size="20">Normalize to Spine, Preserve lineage, RBAC scopes</text>
</svg>
