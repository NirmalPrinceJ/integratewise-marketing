<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ingest: Connectors and Sources</title>
  <desc id="desc">Abstract arrows leading into a grid representing normalized ingestion</desc>
  <rect width="1200" height="800" fill="#1E2A4A"/>
  <g stroke="#3F51B5" stroke-width="4" fill="none">
    <path d="M120 300 C300 300 360 360 520 380"/>
    <path d="M120 420 C280 420 360 420 520 420"/>
    <path d="M120 540 C300 520 360 480 520 460"/>
    <polygon points="520,380 540,388 520,396" fill="#3F51B5"/>
    <polygon points="520,420 540,428 520,436" fill="#3F51B5"/>
    <polygon points="520,460 540,468 520,476" fill="#3F51B5"/>
  </g>
  <g transform="translate(600,300)">
    <rect width="480" height="280" rx="16" fill="#223255" stroke="#3F51B5" stroke-width="2"/>
    <g stroke="#3F51B533">
      <path d="M0 70 H480 M0 140 H480 M0 210 H480"/>
      <path d="M80 0 V280 M160 0 V280 M240 0 V280 M320 0 V280 M400 0 V280"/>
