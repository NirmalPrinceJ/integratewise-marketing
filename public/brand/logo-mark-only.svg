<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IntegrateWise logo mark">
  <title>IntegrateWise Logo Mark</title>
  <!-- Left dashed arc -->
  <path d="M12 20 Q4 32, 12 44" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 3" fill="none" class="logo-primary"/>
  
  <!-- Main connector path -->
  <path d="M20 20 L20 44 Q20 48, 24 48 L40 48 Q44 48, 44 44 L44 20" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" class="logo-primary"/>
  
  <!-- Top left node -->
  <circle cx="20" cy="16" r="6" fill="currentColor" class="logo-primary"/>
  
  <!-- Top right node -->
  <circle cx="44" cy="16" r="6" fill="currentColor" class="logo-primary"/>
  
  <!-- Pink accent dot -->
  <circle cx="52" cy="32" r="5" fill="#F54476" class="logo-accent"/>
  
  <style>
    .logo-primary { color: #3F51B5; }
    @media (prefers-color-scheme: dark) {
      .logo-primary { color: #7986CB; }
    }
  </style>
</svg>
