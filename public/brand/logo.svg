<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IntegrateWise logo">
  <title>IntegrateWise</title>
  <!-- Logo Mark -->
  <g>
    <!-- Left arc (Solid) -->
    <path d="M12 20 Q4 32, 12 44" stroke="#3F51B5" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Main connector path (Solid) -->
    <path d="M20 20 L20 44 Q20 48, 24 48 L40 48 Q44 48, 44 44 L44 20" stroke="#3F51B5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Top left node -->
    <circle cx="20" cy="16" r="6" fill="#3F51B5"/>
    
    <!-- Top right node -->
    <circle cx="44" cy="16" r="6" fill="#3F51B5"/>
    
    <!-- Pink accent dot -->
    <circle cx="52" cy="32" r="5" fill="#F54476"/>
  </g>
  
  <!-- Brand Name Text -->
  <text x="72" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#1E2A4A">IntegrateWise</text>
  <text x="72" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#1E2A4A" opacity="0.8">Enterprise integrations</text>
</svg>