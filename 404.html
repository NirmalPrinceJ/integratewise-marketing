<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IntegrateWise</title>
  <script>
    // SPA fallback for static hosting
    // Stores the requested path and redirects to root
    // The React Router will then handle the routing client-side
    const path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('_spa_path', path);
    window.location.replace('/');
  </script>
</head>
<body>Loading IntegrateWise...</body>
</html>
