name: Publish Sprint Documentation

on:
  # Nightly publish window
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  
  # Manual trigger with approval
  workflow_dispatch:
    inputs:
      sprint_id:
        description: 'Sprint ID to publish (leave empty for all pending)'
        required: false
        type: string
      update_current_pointer:
        description: 'Update current-sprint.json pointer'
        required: false
        type: boolean
        default: false
      current_sprint_id:
        description: 'Sprint ID to set as current (if updating pointer)'
        required: false
        type: string

jobs:
  check-pending:
    name: Check for Pending Publications
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      changed_files: ${{ steps.check.outputs.changed_files }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check staging vs main diff
        id: check
        run: |
          git fetch origin docs/sprints-staging
          
          CHANGED=$(git diff --name-only origin/main...origin/docs/sprints-staging -- docs/sprints/ docs/planning/ || true)
          
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "📋 Pending changes:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No pending changes to publish"
          fi

  publish:
    name: Publish to Main
    needs: check-pending
    if: needs.check-pending.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: sprint-publish
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: docs/sprints-staging
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "IntegrateWise Bot"
          git config user.email "bot@integratewise.com"

      - name: Create publish commit
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Update current-sprint.json if requested
          if [ "${{ github.event.inputs.update_current_pointer }}" = "true" ] && [ -n "${{ github.event.inputs.current_sprint_id }}" ]; then
            cat > docs/sprints/current-sprint.json << EOF
          {
            "current_sprint_id": "${{ github.event.inputs.current_sprint_id }}",
            "current_sprint_path": "docs/sprints/${{ github.event.inputs.current_sprint_id }}.md",
            "last_updated": "$TIMESTAMP",
            "updated_by": "${{ github.actor }}",
            "publish_status": "published",
            "next_publish_window": null
          }
          EOF
            git add docs/sprints/current-sprint.json
          fi
          
          git commit --allow-empty -m "docs(sprint): publish sprint documentation [$TIMESTAMP]"

      - name: Push to main
        run: |
          git push origin docs/sprints-staging:main

      - name: Create publish tag
        run: |
          TAG="sprint-publish-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG" -m "Sprint documentation publish"
          git push origin "$TAG"
          echo "📌 Created tag: $TAG"

      - name: Summary
        run: |
          echo "## 📚 Sprint Documentation Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Published at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.check-pending.outputs.changed_files }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notification
    needs: [check-pending, publish]
    if: always() && needs.check-pending.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify on success
        if: needs.publish.result == 'success'
        run: |
          echo "✅ Sprint documentation published successfully"
          # Add Slack/email notification here

      - name: Notify on failure
        if: needs.publish.result == 'failure'
        run: |
          echo "❌ Sprint documentation publish failed"
          # Add Slack/email notification here
