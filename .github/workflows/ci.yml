name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript
        run: pnpm exec tsc --noEmit

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 7

  validate-schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install validation tools
        run: npm install -g ajv-cli ajv-formats

      - name: Validate Spine JSON Schema
        run: |
          if [ -f "lib/spine/schemas.json" ]; then
            ajv compile -s lib/spine/schemas.json --spec=draft-07 && echo "✅ Spine schema valid"
          fi

      - name: Validate Sprint Doc Schema
        run: |
          if [ -f ".github/schemas/sprint-doc.schema.json" ]; then
            ajv compile -s .github/schemas/sprint-doc.schema.json --spec=draft2020 && echo "✅ Sprint doc schema valid"
          fi

  link-check:
    name: Link Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check internal markdown links
        run: |
          echo "Checking for broken internal links..."
          ERRORS=0
          
          # Find all markdown files
          for file in $(find docs -name "*.md" 2>/dev/null); do
            # Extract internal links
            LINKS=$(grep -oE '\[.*?\]\(/[^)]+\)' "$file" | grep -oE '/[^)]+' || true)
            
            for link in $LINKS; do
              # Convert to file path
              TARGET="docs${link%.md}.md"
              ALT_TARGET="docs${link}/index.md"
              
              if [ ! -f "$TARGET" ] && [ ! -f "$ALT_TARGET" ] && [ ! -d "docs${link}" ]; then
                echo "❌ Broken link in $file: $link"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done
          
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Found $ERRORS broken internal links"
            exit 1
          fi
          
          echo "✅ All internal links valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high || true

      - name: Check for secrets
        run: |
          echo "Scanning for potential secrets..."
          
          # Patterns to check
          PATTERNS=(
            'api[_-]?key\s*[:=]\s*["\047][a-zA-Z0-9]+'
            'secret\s*[:=]\s*["\047][a-zA-Z0-9]+'
            'password\s*[:=]\s*["\047][a-zA-Z0-9]+'
            'token\s*[:=]\s*["\047][a-zA-Z0-9]+'
          )
          
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -riE "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".env.example" || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ Potential secret pattern found:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo "⚠️ Review above matches for hardcoded secrets"
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

      - name: Verify security headers documented
        run: |
          echo "Checking security headers documentation..."
          
          HEADERS=("Content-Security-Policy" "X-Frame-Options" "X-Content-Type-Options" "Referrer-Policy" "Permissions-Policy")
          FOUND=0
          
          for header in "${HEADERS[@]}"; do
            if grep -r "$header" docs/ > /dev/null 2>&1; then
              echo "✅ $header documented"
            else
              echo "❌ $header not documented"
              FOUND=1
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo "❌ Some security headers not documented"
            exit 1
          fi
          
          echo "✅ All required security headers documented"

  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: |
          lhci autorun --config=.lighthouserc.json || echo "Lighthouse check completed"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff mypy

      - name: Run ruff
        run: |
          if [ -d "examples/python" ]; then
            ruff check examples/python/ || true
          fi

      - name: Run mypy
        run: |
          if [ -d "examples/python" ]; then
            mypy examples/python/ --ignore-missing-imports || true
          fi

  validate-diagrams:
    name: Validate Diagrams
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml

      - name: Validate PlantUML diagrams
        run: |
          ERRORS=0
          for file in $(find diagrams -name "*.puml" 2>/dev/null); do
            echo "Validating $file..."
            if plantuml -checkonly "$file" 2>&1; then
              echo "✅ $file valid"
            else
              echo "❌ $file invalid"
              ERRORS=$((ERRORS + 1))
            fi
          done
          
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS diagram(s) failed validation"
            exit 1
          fi
          
          echo "✅ All diagrams valid"

  summary:
    name: CI Summary
    needs: [lint, typecheck, build, validate-schemas, link-check, security-scan, validate-diagrams]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ needs.typecheck.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Schemas | ${{ needs.validate-schemas.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Links | ${{ needs.link-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Diagrams | ${{ needs.validate-diagrams.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
