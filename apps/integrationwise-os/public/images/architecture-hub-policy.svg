<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>
  .t{font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#1E2A4A}
  .h{font-size:34px; font-weight:700}
  .s{font-size:16px; font-weight:600; fill:#3F51B5}
  .p{font-size:16px}
  .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; font-size:14px}
  .box{fill:#ffffff; stroke:rgba(30,42,74,0.15); stroke-width:2; rx:16; ry:16}
  .pill{fill:#F3F4F6; stroke:rgba(30,42,74,0.15); stroke-width:2; rx:999; ry:999}
  .arrow{stroke:#1E2A4A; stroke-width:2.5; marker-end:url(#m)}
</style>
<defs>
  <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 z" fill="#1E2A4A"/>
  </marker>
</defs>
<text x="70" y="80" class="t h">Hub — Routing & Policy Control Plane</text>
<text x="70" y="115" class="t p">Guardrails‑first automation: RBAC, boundaries, retention, redaction, auditing, and usage controls.</text>
<rect x="70" y="160" width="1260" height="210" class="box"/>
<text x="95" y="200" class="t s">Route</text>
<text x="95" y="235" class="t mono">Route(id, source_app, target_app, resource_type, transform_id, policy_id, mode, status)</text>
<rect x="70" y="400" width="1260" height="210" class="box"/>
<text x="95" y="440" class="t s">Policy</text>
<text x="95" y="475" class="t mono">Policy(id, scope, rbac_role, boundary, retention_ttl, redaction_rules, audit_required)</text>
<rect x="70" y="640" width="1260" height="210" class="box"/>
<text x="95" y="680" class="t s">AuditLog</text>
<text x="95" y="715" class="t mono">AuditLog(actor_id, action, resource, before, after, correlation_id, timestamp)</text>
<line x1="700" y1="270" x2="700" y2="400" class="arrow"/>
<line x1="700" y1="510" x2="700" y2="640" class="arrow"/>
<rect x="980" y="180" width="330" height="150" class="pill"/>
<text x="1000" y="220" class="t s">Usage controls</text>
<text x="1000" y="250" class="t p">Metering • rate caps</text>
<text x="1000" y="280" class="t p">Anomaly alerts • quotas</text>
</svg>