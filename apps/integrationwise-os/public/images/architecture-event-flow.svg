<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
<style>
  .t{font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#1E2A4A}
  .h{font-size:34px; font-weight:700}
  .s{font-size:16px; font-weight:600; fill:#3F51B5}
  .p{font-size:16px}
  .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; font-size:14px}
  .box{fill:#ffffff; stroke:rgba(30,42,74,0.15); stroke-width:2; rx:16; ry:16}
  .pill{fill:#F3F4F6; stroke:rgba(30,42,74,0.15); stroke-width:2; rx:999; ry:999}
  .arrow{stroke:#1E2A4A; stroke-width:2.5; marker-end:url(#m)}
</style>
<defs>
  <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 z" fill="#1E2A4A"/>
  </marker>
</defs>
<text x="70" y="80" class="t h">IntegrateWise Event Flow</text>
<text x="70" y="115" class="t p">Connect → Normalize → Authorize → Transform → Dispatch → Render → Audit</text>
<rect x="70" y="170" width="170" height="90" class="box"/>
<text x="85" y="210" class="t s">Ingest</text>
<text x="85" y="240" class="t p">Connectors / Webhooks</text>
<rect x="260" y="170" width="170" height="90" class="box"/>
<text x="275" y="210" class="t s">Normalize</text>
<text x="275" y="240" class="t p">Spine canonical</text>
<rect x="450" y="170" width="170" height="90" class="box"/>
<text x="465" y="210" class="t s">Authorize</text>
<text x="465" y="240" class="t p">Hub + Policy</text>
<rect x="640" y="170" width="170" height="90" class="box"/>
<text x="655" y="210" class="t s">Transform</text>
<text x="655" y="240" class="t p">Mapping + PII</text>
<rect x="830" y="170" width="170" height="90" class="box"/>
<text x="845" y="210" class="t s">Dispatch</text>
<text x="845" y="240" class="t p">Target apps</text>
<rect x="1020" y="170" width="170" height="90" class="box"/>
<text x="1035" y="210" class="t s">Render</text>
<text x="1035" y="240" class="t p">Docs/Decks/Emails</text>
<rect x="1210" y="170" width="170" height="90" class="box"/>
<text x="1225" y="210" class="t s">Audit</text>
<text x="1225" y="240" class="t p">Immutable logs</text>
<line x1="240" y1="215" x2="260" y2="215" class="arrow"/>
<line x1="430" y1="215" x2="450" y2="215" class="arrow"/>
<line x1="620" y1="215" x2="640" y2="215" class="arrow"/>
<line x1="810" y1="215" x2="830" y2="215" class="arrow"/>
<line x1="1000" y1="215" x2="1020" y2="215" class="arrow"/>
<line x1="1190" y1="215" x2="1210" y2="215" class="arrow"/>
<rect x="70" y="310" width="610" height="180" class="box"/>
<text x="90" y="350" class="t s">Modes</text>
<text x="90" y="380" class="t p">Full Integration: two‑way sync + automation</text>
<text x="90" y="410" class="t p">Render Only: read‑only analytics + outputs (zero write)</text>
<rect x="720" y="310" width="610" height="180" class="box"/>
<text x="740" y="350" class="t s">Proof hooks</text>
<text x="740" y="380" class="t mono">event_id • idempotency_key • correlation_id</text>
<text x="740" y="410" class="t p">Every action/output is auditable and exportable.</text>
</svg>