<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Integrations Ecosystem</title>
  <desc id="desc">Logos grid for Google, Slack, Salesforce, and others in a dark tech aesthetic</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A4A"/>
      <stop offset="100%" stop-color="#2A3B66"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3F51B5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="800" fill="url(#glow)"/>
  <g stroke="#3F51B533" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200"/>
    <path d="M100 0 V800 M200 0 V800 M300 0 V800 M400 0 V800 M500 0 V800 M600 0 V800 M700 0 V800 M800 0 V800 M900 0 V800 M1000 0 V800 M1100 0 V800"/>
  </g>
  <text x="60" y="80" fill="#F3F4F6" font-family="Inter, system-ui, -apple-system" font-weight="600" font-size="36">Connected Ecosystem</text>
  <text x="60" y="120" fill="#C7CBD6" font-family="Inter" font-size="20">Google, Slack, Salesforce, HubSpot, Stripe, Notion</text>
  <g transform="translate(60,180)">
    <g transform="translate(0,0)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <circle cx="60" cy="60" r="28" fill="#F3F4F6"/>
      <text x="110" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Google</text>
    </g>
    <g transform="translate(220,0)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <g transform="translate(40,40)">
        <circle r="10" fill="#36C5F0" cx="0" cy="0"/>
        <circle r="10" fill="#2EB67D" cx="22" cy="0"/>
        <circle r="10" fill="#E01E5A" cx="0" cy="22"/>
        <circle r="10" fill="#ECB22E" cx="22" cy="22"/>
      </g>
      <text x="110" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Slack</text>
    </g>
    <g transform="translate(440,0)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <path d="M40,80 C40,50 80,40 110,55 C140,70 150,110 120,120 H60" fill="#00A1E0"/>
      <text x="110" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Salesforce</text>
    </g>
    <g transform="translate(660,0)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <rect x="40" y="40" width="32" height="32" fill="#2EB67D"/>
      <rect x="80" y="40" width="32" height="32" fill="#36C5F0"/>
      <text x="118" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">HubSpot</text>
    </g>
    <g transform="translate(880,0)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <rect x="40" y="40" width="80" height="40" rx="8" fill="#635BFF"/>
      <text x="130" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Stripe</text>
    </g>
    <g transform="translate(0,160)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <polygon points="40,50 80,50 100,70 60,70" fill="#F3F4F6"/>
      <text x="110" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Notion</text>
    </g>
    <g transform="translate(220,160)">
      <rect width="180" height="120" rx="12" fill="#223255" stroke="#3F51B5"/>
      <circle cx="60" cy="60" r="22" fill="#F54476"/>
      <text x="110" y="68" fill="#F3F4F6" font-family="Inter" font-size="22">Custom</text>
    </g>
  </g>
